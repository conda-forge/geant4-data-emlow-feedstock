{% set dataset_name = "EMLOW" %}
#Always include three digits x.y.z here!
{% set version = "8.8.0" %}
#url version does not include .0 for x.y.0 versions
{% set version_dl = "8.8" %}
{% set sha256 = "b60cfd63176f5d16107e2a25b35b235155032d1735d749670ca50fede12624cf" %}
{% set env_var = "G4LEDATA" %}
{% set summary = "GEANT4 data files for low energy electromagnetic processes" %}

{% set name = "geant4-data-"+dataset_name.lower() %}
{% set install_dir = "share/Geant4/data/"+dataset_name+version %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://geant4-data.web.cern.ch/geant4-data/datasets/G4{{ dataset_name }}.{{ version_dl }}.tar.gz
  sha256: {{ sha256 }}
  folder: dataset

build:
  number: 0
  noarch: generic
  script:
    - mkdir -p ${PREFIX}/{{ install_dir }}
    - cp -r dataset/* ${PREFIX}/{{ install_dir }}
    - ${RECIPE_DIR}/create_activation_scripts.sh {{ name }} {{ env_var }} {{ install_dir }}

# Conda-forge is unable to build packages that have no dependencies so add
# `make` as a dummy build dependency
requirements:
  build:
    - make

test:
  commands:
    - '[ "${{ env_var }}" == "$CONDA_PREFIX/{{ install_dir }}" ]'

about:
  home: https://geant4.web.cern.ch/
  summary: {{ summary }}
  license: OTHER
  license_file: CREDIT

extra:
  recipe-maintainers:
    - chrisburr
    - tkittel
